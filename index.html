<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Freizeit Community</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#7c3aed;--purple-light:#ede9fe;
  --green:#059669;--green-light:#d1fae5;
  --pink:#db2777;--pink-light:#fce7f3;
  --blue:#0284c7;--blue-light:#e0f2fe;
  --bg:#f5f3ff;--card:#fff;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
.app{max-width:860px;margin:0 auto;padding:12px 10px 40px}

/* HEADER */
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:18px;padding:22px 20px;color:#fff;margin-bottom:14px;text-align:center}
.header h1{font-size:1.55rem;font-weight:800;margin-bottom:3px}
.header p{font-size:0.85rem;opacity:.85}

/* CARDS */
.card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid var(--border)}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:9px;border:none;cursor:pointer;font-size:.85rem;font-weight:700;transition:all .18s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-sm{padding:5px 11px;font-size:.76rem;border-radius:7px;border:none;cursor:pointer;font-weight:700;transition:all .15s}
.btn-danger{background:#fee2e2;color:#dc2626}
.btn-danger:hover{background:#fecaca}
.btn-success{background:#d1fae5;color:#059669}
.btn-success:hover{background:#a7f3d0}
.btn-secondary{background:#f3f4f6;color:#374151}
.btn-secondary:hover{background:#e5e7eb}
.btn-link{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.btn-link:hover{background:#dbeafe}

/* FORMS */
input:not([type=color]):not([type=range]):not([type=checkbox]),textarea,select{
  width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;
  font-size:.87rem;outline:none;transition:border .2s;font-family:inherit;background:var(--card);color:var(--text)
}
input:focus,textarea:focus,select:focus{border-color:#667eea;box-shadow:0 0 0 3px #667eea22}
textarea{resize:vertical;min-height:72px}
label{font-size:.78rem;font-weight:700;color:var(--muted);margin-bottom:4px;display:block}
.form-row{margin-bottom:13px}

/* TAGS */
.tag{display:inline-block;padding:3px 11px;border-radius:20px;font-size:.72rem;font-weight:800;letter-spacing:.3px}

/* LAYOUT HELPERS */
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.flex-between{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px}
.modal{background:var(--card);border-radius:18px;padding:24px;max-width:520px;width:100%;max-height:92vh;overflow-y:auto}
.modal h2{margin-bottom:16px;font-size:1.1rem;font-weight:700}

/* ACTIVITY CARD */
.activity-card{border-left:4px solid;border-radius:13px;padding:14px 15px;margin-bottom:11px;background:var(--card);box-shadow:0 2px 8px rgba(0,0,0,.05);transition:box-shadow .2s}
.activity-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.09)}
.activity-card.closed{opacity:.72;border-style:dashed}

/* IMAGE DROP ZONE */
.img-dropzone{border:2px dashed var(--border);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;color:var(--muted);font-size:.82rem;position:relative;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.img-dropzone:hover,.img-dropzone.dragover{border-color:#667eea;background:#f5f3ff;color:#667eea}
.img-dropzone .dz-icon{font-size:1.8rem}
.img-dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-thumb{width:100%;max-height:180px;object-fit:cover;border-radius:9px;margin-top:8px;display:block}
.img-thumb-small{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-top:8px;display:block}
.img-remove{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
.img-wrapper{position:relative;display:inline-block;width:100%}

/* COMMENTS */
.comment{background:#f8f7ff;border-radius:9px;padding:10px 12px;margin-top:8px;font-size:.82rem;line-height:1.5}
.comment a{color:#667eea;word-break:break-all}

/* HEARTS */
.hearts-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;align-items:center}
.heart-dot{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:.75rem;border:1px solid rgba(0,0,0,.12);transition:transform .15s}
.heart-dot:hover{transform:scale(1.2)}

/* FILTER */
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.filter-btn{padding:5px 13px;border-radius:20px;border:2px solid;cursor:pointer;font-size:.76rem;font-weight:700;transition:all .18s}

/* USER BADGE */
.user-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:.74rem;font-weight:700}
.avatar{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:800;flex-shrink:0}

/* FUN BAR */
.fun-bar{height:7px;border-radius:4px;background:#e5e7eb;margin-top:5px;overflow:hidden}
.fun-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#f59e0b,#ef4444)}

/* SECTION TITLE */
.section-title{font-size:.8rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;margin-top:4px}

/* TABS/NAV */
.topbar{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.tab{padding:7px 15px;border-radius:9px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:.82rem;font-weight:700;color:var(--muted);transition:all .18s}
.tab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent}

/* PASSWORD SCREEN */
.pw-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background-color:#1a0a3c;background-size:contain;background-position:center;background-repeat:no-repeat;padding:16px;position:relative}.pw-screen::before{content:"";position:absolute;inset:0;background:rgba(20,8,50,0.35)}.pw-card{position:relative;z-index:1}
.pw-card{background:#fff;border-radius:22px;padding:36px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.pw-image-card{position:relative;width:100%;max-width:420px;margin:0 auto;border-radius:22px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.45)}
.pw-image-card img.bg-img{width:100%;display:block}
.pw-title-area{position:absolute;top:18px;left:0;right:0;text-align:center;padding:0 20px;z-index:2}
.pw-phone-overlay{position:absolute;z-index:2;bottom:15.5%;right:5%;width:30%;transform:rotate(-1deg)}
.pw-phone-screen{background:rgba(255,255,255,.96);border-radius:10px;padding:12px 10px;box-shadow:0 4px 20px rgba(0,0,0,.35),inset 0 0 0 2px rgba(102,126,234,.3)}
@media(max-width:480px){
  .pw-phone-overlay{width:33%;bottom:14%;right:4%}
}

/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;background:#1a1a2e;color:#fff;padding:11px 20px;border-radius:11px;font-size:.85rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:260px}

/* LINK DISPLAY */
.act-link{display:inline-flex;align-items:center;gap:4px;color:#2563eb;font-size:.8rem;text-decoration:none;padding:3px 9px;background:#eff6ff;border-radius:6px;border:1px solid #bfdbfe;margin-top:5px;word-break:break-all}
.act-link:hover{background:#dbeafe}

/* LOADING */
.loading{text-align:center;padding:60px 20px;color:#667eea;font-size:1rem}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#667eea;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* SYNC indicator */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sync-dot.live{background:#10b981;animation:pulse 2s infinite}
.sync-dot.offline{background:#f59e0b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* EMPTY */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);font-size:.92rem}

/* MOBILE */
@media(max-width:480px){
  .modal{padding:18px}
  .activity-card{padding:12px}
  .header{padding:16px}
}
</style>
</head>

<div id="root"><div class="loading"><div class="spinner"></div><br>App wird geladen...</div></div>
<div id="toast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* ============================================================
   FIREBASE KONFIGURATION
   → Ersetze diese Werte mit deiner eigenen Firebase-Konfiguration!
   → Anleitung: https://console.firebase.google.com/
   → Neues Projekt → Realtime Database aktivieren → App registrieren
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "DEIN_API_KEY",
  authDomain: "DEIN_PROJEKT.firebaseapp.com",
  databaseURL: "https://DEIN_PROJEKT-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "DEIN_PROJEKT",
  storageBucket: "DEIN_PROJEKT.appspot.com",
  messagingSenderId: "DEINE_SENDER_ID",
  appId: "DEINE_APP_ID"
};

/* ============================================================
   APP PASSWORT – hier ändern!
   ============================================================ */
const APP_PASSWORD = "freizeit2024";

/* ============================================================
   STANDARD-KATEGORIEN
   ============================================================ */
const DEFAULT_CATEGORIES = [
  {id:"indoor-kind", label:"🏠 Indoor mit Kind",   color:"#7c3aed", bg:"#ede9fe"},
  {id:"outdoor-kind",label:"🌳 Outside mit Kind",  color:"#059669", bg:"#d1fae5"},
  {id:"indoor-couple",label:"🍷 Indoor Pärchen",   color:"#db2777", bg:"#fce7f3"},
  {id:"outdoor-couple",label:"🚴 Outside Pärchen", color:"#0284c7", bg:"#e0f2fe"},
];

/* ============================================================
   HELPERS
   ============================================================ */
function toast(msg, dur=2400){
  const el=document.getElementById("toast");
  el.textContent=msg; el.style.opacity=1;
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.opacity=0, dur);
}

function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}

function parseLinks(text){
  if(!text) return "";
  const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  return escaped.replace(/(https?:\/\/[^\s<>"]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function getContrast(hex){
  try{
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return (r*299+g*587+b*114)/1000>130?"#1a1a2e":"#ffffff";
  }catch(e){return "#ffffff";}
}

function fmtDate(ts){
  return new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});
}

function resizeImage(file, maxW=900, maxH=700, quality=0.78){
  return new Promise((resolve)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
        if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
        const canvas=document.createElement("canvas");
        canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg",quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ============================================================
   LOCAL USER STORAGE
   ============================================================ */
const USER_KEY = "freizeit_user_v3";
function loadUser(){try{const s=localStorage.getItem(USER_KEY);return s?JSON.parse(s):null;}catch(e){return null;}}
function saveUser(u){localStorage.setItem(USER_KEY,JSON.stringify(u));}
function clearUser(){localStorage.removeItem(USER_KEY);}

/* ============================================================
   APP STATE
   ============================================================ */
const S = {
  authed: false,
  user: loadUser(),
  db: null,
  dbReady: false,
  activities: {},      // {id: actObj}
  categories: {},      // {id: catObj}
  filterCats: [],
  showClosed: false,
  modal: null,         // null | "new" | "profile" | "cats" | "rating:ID" | "comment:ID"
  // form state
  newAct: {title:"", desc:"", cat:"", link:"", imgData:""},
  editUser: {name:"", color:"#667eea"},
  newCatName: "",
  ratingVal: 75,
  commentText: {},
  dragOver: false,
};

/* ============================================================
   FIREBASE INIT & SYNC
   ============================================================ */
function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    S.db = firebase.database();

    // Sync activities
    S.db.ref("activities").on("value", snap=>{
      S.activities = snap.val() || {};
      S.dbReady = true;
      render();
    });

    // Sync categories – merge with defaults
    S.db.ref("categories").on("value", snap=>{
      const remote = snap.val() || {};
      const merged = {};
      DEFAULT_CATEGORIES.forEach(c=>merged[c.id]=c);
      Object.assign(merged, remote);
      S.categories = merged;
      render();
    });

  } catch(e){
    console.error("Firebase error:", e);
    // Fallback: localStorage mode
    S.dbReady = true;
    S.activities = JSON.parse(localStorage.getItem("fc_acts")||"{}");
    S.categories = {};
    DEFAULT_CATEGORIES.forEach(c=>S.categories[c.id]=c);
    const localCats = JSON.parse(localStorage.getItem("fc_cats")||"{}");
    Object.assign(S.categories, localCats);
    render();
  }
}

async function dbSet(path, value){
  if(S.db){
    await S.db.ref(path).set(value);
  } else {
    // localStorage fallback
    if(path.startsWith("activities/")){
      const id=path.split("/")[1];
      S.activities[id]=value;
      localStorage.setItem("fc_acts", JSON.stringify(S.activities));
    } else if(path.startsWith("categories/")){
      const id=path.split("/")[1];
      S.categories[id]=value;
      localStorage.setItem("fc_cats", JSON.stringify(S.categories));
    }
    render();
  }
}

async function dbRemove(path){
  if(S.db){
    await S.db.ref(path).remove();
  } else {
    if(path.startsWith("activities/")){
      const id=path.split("/")[1];
      delete S.activities[id];
      localStorage.setItem("fc_acts", JSON.stringify(S.activities));
    } else if(path.startsWith("categories/")){
      const id=path.split("/")[1];
      delete S.categories[id];
      localStorage.setItem("fc_cats", JSON.stringify(S.categories));
    }
    render();
  }
}

/* ============================================================
   RENDER ENGINE
   ============================================================ */
function render(){
  const root = document.getElementById("root");
  if(!S.authed){
    root.innerHTML = renderLogin();
    bindLogin();
    return;
  }
  root.innerHTML = renderApp();
  bindApp();
}

function bindLogin(){
  const btn=document.getElementById("pw-btn");
  const inp=document.getElementById("pw-in");
  const err=document.getElementById("pw-err");
  const go=()=>{
    if(inp.value===APP_PASSWORD){
      S.authed=true;
      if(!S.user) S.modal="profile";
      render();
    } else {
      err.style.display="block";
      inp.value=""; inp.focus();
    }
  };
  btn.onclick=go;
  inp.onkeydown=e=>{if(e.key==="Enter")go();};
}

/* ---- MAIN APP ---- */
function renderApp(){
  const u = S.user;
  const allCats = Object.values(S.categories);
  let acts = Object.values(S.activities).sort((a,b)=>b.ts-a.ts);
  if(S.filterCats.length) acts = acts.filter(a=>S.filterCats.includes(a.cat));
  const openActs = acts.filter(a=>!a.closed);
  const closedActs = acts.filter(a=>a.closed);
  const visibleActs = S.showClosed ? acts : openActs;

  const syncStatus = S.db
    ? `<span class="sync-dot live" title="Echtzeit-Sync aktiv"></span> Live`
    : `<span class="sync-dot offline" title="Lokaler Modus"></span> Lokal`;

  return `
  <div class="app">

    <div class="header">
      <h1>🎉 Freizeit Community</h1>
      <p>Teile deine besten Freizeittipps mit der Gruppe!</p>
    </div>

    <!-- TOP BAR -->
    <div class="card" style="padding:10px 14px">
      <div class="flex-between">
        <div class="flex">
          ${u ? `<span>${renderUserBadge(u.name,u.color)}</span>` : ""}
          <button class="btn-sm btn-secondary" id="btn-profile">👤 Profil</button>
          <span style="font-size:.74rem;color:var(--muted)">${syncStatus}</span>
        </div>
        <div class="flex">
          <button class="btn btn-primary" id="btn-new" style="padding:7px 14px">✨ Neuer Tipp</button>
          <button class="btn-sm btn-secondary" id="btn-cats">⚙️ Kategorien</button>
        </div>
      </div>
    </div>

    <!-- FILTER -->
    <div class="card" style="padding:12px 14px">
      <div class="section-title">Filter nach Kategorie</div>
      <div class="filter-row">
        ${allCats.map(cat=>{
          const active=S.filterCats.includes(cat.id);
          return `<button class="filter-btn" data-cat="${cat.id}"
            style="background:${active?cat.color:cat.bg};color:${active?"#fff":cat.color};border-color:${cat.color}">
            ${cat.label}
          </button>`;
        }).join("")}
        ${S.filterCats.length ? `<button class="btn-sm btn-danger" id="clear-filter">✕ Reset</button>` : ""}
      </div>
      <div class="flex">
        <label style="margin:0;display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.8rem;font-weight:600;color:var(--muted)">
          <input type="checkbox" id="show-closed" ${S.showClosed?"checked":""}> Abgeschlossene anzeigen
        </label>
        <span style="font-size:.76rem;color:var(--muted);margin-left:auto">
          ${openActs.length} offen · ${closedActs.length} abgeschlossen
        </span>
      </div>
    </div>

    <!-- ACTIVITIES -->
    ${visibleActs.length===0
      ? `<div class="empty-state">😊 Keine Einträge gefunden.<br>Sei der Erste und teile einen Tipp!</div>`
      : ""}
    ${openActs.length && !S.showClosed ? openActs.map(a=>renderActivity(a)).join("") : ""}
    ${S.showClosed && visibleActs.length ? `
      ${openActs.length ? openActs.map(a=>renderActivity(a)).join("") : ""}
      ${closedActs.length ? `<div class="section-title" style="margin-top:14px">✅ Abgeschlossene Aktivitäten (${closedActs.length})</div>` : ""}
      ${closedActs.map(a=>renderActivity(a)).join("")}
    ` : ""}

  </div>

  ${S.modal==="new" ? renderNewModal() : ""}
  ${S.modal==="profile" ? renderProfileModal() : ""}
  ${S.modal==="cats" ? renderCatsModal() : ""}
  ${S.modal&&S.modal.startsWith("rating:") ? renderRatingModal(S.modal.split(":")[1]) : ""}
  `;
}

/* ---- ACTIVITY CARD ---- */
function renderActivity(a){
  const cat = S.categories[a.cat] || {label:a.cat,color:"#9ca3af",bg:"#f3f4f6"};
  const userId = S.user?.id||"";
  const hearts = a.hearts || {};
  const allHearts = Object.values(hearts);
  const myHearts = allHearts.filter(h=>h.uid===userId).length;
  const totalHearts = allHearts.length;

  // Group hearts by user for display
  const byUser = {};
  allHearts.forEach(h=>{
    if(!byUser[h.uid]) byUser[h.uid]={color:h.color,name:h.name,count:0};
    byUser[h.uid].count++;
  });

  const comments = a.comments ? Object.values(a.comments).sort((a,b)=>a.ts-b.ts) : [];

  return `<div class="activity-card ${a.closed?"closed":""}" style="border-left-color:${cat.color}" id="act-${a.id}">

    <!-- Header row -->
    <div class="flex-between" style="margin-bottom:8px">
      <div class="flex">
        <span class="tag" style="background:${cat.bg};color:${cat.color}">${cat.label}</span>
        ${a.closed ? `<span class="tag" style="background:#fef3c7;color:#92400e">✅ Fertig</span>` : ""}
      </div>
      <div class="flex" style="gap:5px">
        <button class="btn-sm btn-secondary act-edit" data-id="${a.id}" title="Bearbeiten">✏️</button>
        <button class="btn-sm btn-danger act-del" data-id="${a.id}" title="Löschen">🗑</button>
        ${!a.closed
          ? `<button class="btn-sm btn-success act-close" data-id="${a.id}">✓ Erledigt</button>`
          : `<button class="btn-sm btn-secondary act-rate" data-id="${a.id}">⭐ Bewerten</button>`
        }
      </div>
    </div>

    <!-- Title & desc -->
    <h3 style="font-size:1rem;font-weight:700;margin-bottom:5px;line-height:1.35">${escHtml(a.title)}</h3>
    <p style="font-size:.85rem;color:#4b5563;line-height:1.6;margin-bottom:6px">${escHtml(a.desc)}</p>

    <!-- Link -->
    ${a.link ? `<div style="margin-bottom:6px"><a class="act-link" href="${escAttr(a.link)}" target="_blank" rel="noopener">🔗 ${escHtml(a.link)}</a></div>` : ""}

    <!-- Image -->
    ${a.imgData ? `<div class="img-wrapper"><img src="${a.imgData}" class="img-thumb-small" alt="Bild"></div>` : ""}

    <!-- Author & date -->
    <div class="flex" style="margin:8px 0 2px">
      ${renderUserBadge(a.userName, a.userColor)}
      <span style="font-size:.73rem;color:var(--muted)">${fmtDate(a.ts)}</span>
    </div>
    ${a.editedAt ? `<div class="flex" style="margin-bottom:4px">
      <span style="font-size:.7rem;color:var(--muted);font-style:italic">
        ✏️ Bearbeitet ${fmtDate(a.editedAt)}
        ${a.editedBy ? ` von ${renderUserBadge(a.editedBy, a.editedByColor||"#9ca3af")}` : "(Ersteller)"}
      </span>
    </div>` : ""}

    <!-- Rating bar (if rated) -->
    ${a.closed && a.rating!=null ? `
      <div class="flex" style="margin:6px 0 2px;gap:6px">
        <span style="font-size:1.1rem;font-weight:800;color:#f59e0b">⭐ ${a.rating}%</span>
        <span style="font-size:.78rem;color:var(--muted)">Spaßfaktor</span>
      </div>
      <div class="fun-bar"><div class="fun-fill" style="width:${a.rating}%"></div></div>
    ` : ""}

    <!-- Hearts -->
    <div class="hearts-row">
      ${Object.values(byUser).map(u=>
        Array(u.count).fill(null).map(()=>
          `<span class="heart-dot" title="${escAttr(u.name)}" style="background:${u.color}22;border-color:${u.color}">❤</span>`
        ).join("")
      ).join("")}
      ${!a.closed && S.user && myHearts<3
        ? `<button class="btn-sm heart-btn" data-id="${a.id}" style="background:#fef2f2;color:#ef4444;border:1px solid #fecaca">+❤ ${myHearts}/3</button>`
        : ""}
      ${totalHearts>0 ? `<span style="font-size:.76rem;color:var(--muted)">${totalHearts} ❤</span>` : ""}
    </div>

    <!-- Comments -->
    <div style="margin-top:8px">
      ${comments.map(c=>`<div class="comment">
        <div class="flex" style="margin-bottom:3px">${renderUserBadge(c.userName,c.userColor)}
          <span style="font-size:.7rem;color:var(--muted)">${fmtDate(c.ts)}</span>
        </div>
        <div style="color:#374151;font-size:.83rem">${parseLinks(c.text)}</div>
      </div>`).join("")}
      ${S.user ? `<div class="flex" style="margin-top:8px;gap:6px">
        <input type="text" class="comment-input" data-id="${a.id}"
          placeholder="Kommentar oder Link (https://…)" style="flex:1;padding:7px 10px;font-size:.82rem">
        <button class="btn-sm btn-primary comment-send" data-id="${a.id}" style="flex-shrink:0">➤</button>
      </div>` : ""}
    </div>

  </div>`;
}

/* ---- USER BADGE ---- */
function renderUserBadge(name, color){
  const c = color||"#667eea";
  const tc = getContrast(c);
  const initials = (name||"?").trim().slice(0,2).toUpperCase();
  return `<span class="user-badge" style="background:${c}22;color:${c}">
    <span class="avatar" style="background:${c};color:${tc}">${initials}</span>${escHtml(name||"Anon")}
  </span>`;
}

/* ---- ESCAPE HELPERS ---- */
function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escAttr(s){return String(s||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

/* ============================================================
   EVENT BINDING
   ============================================================ */
function bindApp(){
  const q = s=>document.querySelector(s);
  const qa = s=>document.querySelectorAll(s);

  /* Topbar */
  q("#btn-new")?.addEventListener("click",()=>{
    S.newAct={title:"",desc:"",cat:"",link:"",imgData:""};
    S.modal="new"; render();
  });
  q("#btn-profile")?.addEventListener("click",()=>{
    const u=S.user;
    S.editUser={name:u?.name||"",color:u?.color||"#667eea"};
    S.modal="profile"; render();
  });
  q("#btn-cats")?.addEventListener("click",()=>{S.newCatName="";S.modal="cats";render();});

  /* Filter */
  qa(".filter-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const cat=btn.dataset.cat;
      S.filterCats=S.filterCats.includes(cat)?S.filterCats.filter(c=>c!==cat):[...S.filterCats,cat];
      render();
    });
  });
  q("#clear-filter")?.addEventListener("click",()=>{S.filterCats=[];render();});
  q("#show-closed")?.addEventListener("change",e=>{S.showClosed=e.target.checked;render();});

  /* Activity actions */
  qa(".act-del").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      if(!confirm("Eintrag wirklich löschen?"))return;
      await dbRemove("activities/"+btn.dataset.id);
      toast("🗑 Gelöscht");
    });
  });
  qa(".act-edit").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const a=S.activities[btn.dataset.id];
      if(!a)return;
      S.newAct={
        editId: a.id,
        title: a.title,
        desc: a.desc||"",
        cat: a.cat,
        link: a.link||"",
        imgData: a.imgData||""
      };
      S.modal="new";
      render();
    });
  });
  qa(".act-edit").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const a=S.activities[btn.dataset.id];
      if(!a)return;
      S.newAct={
        editId:a.id, title:a.title, desc:a.desc||"",
        cat:a.cat, link:a.link||"", imgData:a.imgData||""
      };
      S.modal="new"; render();
    });
  });
  qa(".act-close").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const a=S.activities[btn.dataset.id];
      if(!a)return;
      a.closed=true;
      await dbSet("activities/"+btn.dataset.id, a);
      toast("✅ Als erledigt markiert!");
    });
  });
  qa(".act-rate").forEach(btn=>{
    btn.addEventListener("click",()=>{S.ratingVal=S.activities[btn.dataset.id]?.rating||75;S.modal="rating:"+btn.dataset.id;render();});
  });

  /* Hearts */
  qa(".heart-btn").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const user=S.user; if(!user)return;
      const a=S.activities[btn.dataset.id]; if(!a)return;
      const hearts=a.hearts||{};
      const mine=Object.values(hearts).filter(h=>h.uid===user.id).length;
      if(mine>=3){toast("Max. 3 ❤️ pro Vorschlag!");return;}
      const hid=uid();
      hearts[hid]={uid:user.id,name:user.name,color:user.color};
      a.hearts=hearts;
      await dbSet("activities/"+a.id, a);
      toast("❤️ Geliked!");
    });
  });

  /* Comments */
  qa(".comment-send").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const user=S.user; if(!user)return;
      const inp=document.querySelector(`.comment-input[data-id="${btn.dataset.id}"]`);
      const text=inp?.value?.trim(); if(!text)return;
      const a=S.activities[btn.dataset.id]; if(!a)return;
      if(!a.comments)a.comments={};
      const cid=uid();
      a.comments[cid]={id:cid,uid:user.id,userName:user.name,userColor:user.color,text,ts:Date.now()};
      await dbSet("activities/"+a.id, a);
      toast("💬 Kommentar gespeichert!");
    });
  });

  /* ---- NEW MODAL ---- */
  if(S.modal==="new"){
    q("#na-cancel")?.addEventListener("click",()=>{S.modal=null;render();});
    q("#modal-bg")?.addEventListener("click",e=>{if(e.target.id==="modal-bg"){S.modal=null;render();}});

    // Dropzone drag & drop — NO full re-render to preserve field values
    function updateImgPreview(data){
      S.newAct.imgData=data;
      const area=q("#img-preview-area");
      if(!area)return;
      if(data){
        area.innerHTML=`<div class="img-wrapper">
          <img src="${data}" class="img-thumb" id="img-preview-thumb">
          <button class="img-remove" id="img-clear" title="Bild entfernen">✕</button>
        </div>`;
        area.querySelector("#img-clear")?.addEventListener("click",()=>updateImgPreview(""));
      } else {
        area.innerHTML="";
      }
    }
    const dz=q("#dropzone");
    if(dz){
      dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("dragover");});
      dz.addEventListener("dragleave",()=>dz.classList.remove("dragover"));
      dz.addEventListener("drop",async e=>{
        e.preventDefault();dz.classList.remove("dragover");
        const file=e.dataTransfer.files[0];
        if(file&&file.type.startsWith("image/")){
          const data=await resizeImage(file);
          updateImgPreview(data);
        }
      });
    }
    q("#na-img-file")?.addEventListener("change",async e=>{
      const file=e.target.files[0];
      if(file){const data=await resizeImage(file);updateImgPreview(data);}
    });
    q("#img-clear")?.addEventListener("click",()=>updateImgPreview(""));

    q("#na-save")?.addEventListener("click",async()=>{
      const user=S.user;
      const title=q("#na-title")?.value?.trim();
      const desc=q("#na-desc")?.value?.trim();
      const cat=q("#na-cat")?.value;
      const link=q("#na-link")?.value?.trim();
      if(!title){toast("Bitte Titel eingeben!");return;}
      if(!cat){toast("Bitte Kategorie wählen!");return;}
      const isEdit=!!S.newAct.editId;
      if(isEdit){
        // EDIT existing activity
        const existing=S.activities[S.newAct.editId];
        if(!existing){toast("Eintrag nicht gefunden!");return;}
        const wasEdited = existing.uid !== (user?.id||"anon");
        const updatedAct={
          ...existing,
          title, desc:desc||"", cat, link:link||"",
          imgData:S.newAct.imgData||"",
          editedAt:Date.now(),
          editedBy: wasEdited ? (user?.name||"Anon") : null,
          editedByColor: wasEdited ? (user?.color||"#9ca3af") : null,
        };
        await dbSet("activities/"+existing.id, updatedAct);
        toast("✏️ Eintrag aktualisiert!");
      } else {
        // NEW activity
        const id=uid();
        const act={
          id, title, desc:desc||"", cat, link:link||"",
          imgData:S.newAct.imgData||"",
          uid:user?.id||"anon", userName:user?.name||"Anon", userColor:user?.color||"#9ca3af",
          hearts:{}, comments:{}, ts:Date.now(), closed:false,
          editedAt:null, editedBy:null, editedByColor:null
        };
        await dbSet("activities/"+id, act);
        toast("✨ Tipp gespeichert!");
      }
      S.modal=null; render();
    });
  }

  /* ---- PROFILE MODAL ---- */
  if(S.modal==="profile"){
    q("#eu-cancel")?.addEventListener("click",()=>{S.modal=null;render();});
    q("#modal-bg")?.addEventListener("click",e=>{
      if(e.target.id==="modal-bg"&&S.user){S.modal=null;render();}
    });
    q("#eu-color")?.addEventListener("input",e=>{
      S.editUser.color=e.target.value;
      const n=q("#eu-name")?.value||"Vorschau";
      const prev=q("#eu-preview");
      if(prev)prev.innerHTML=renderUserBadge(n,e.target.value);
    });
    q("#eu-name")?.addEventListener("input",e=>{
      const prev=q("#eu-preview");
      if(prev)prev.innerHTML=renderUserBadge(e.target.value||"Vorschau",q("#eu-color")?.value||"#667eea");
    });
    q("#eu-save")?.addEventListener("click",()=>{
      const name=q("#eu-name")?.value?.trim();
      const color=q("#eu-color")?.value;
      if(!name){toast("Bitte Namen eingeben!");return;}
      const u={id:S.user?.id||uid(),name,color};
      S.user=u; saveUser(u);
      toast("👤 Profil gespeichert!");
      S.modal=null; render();
    });
    q("#eu-del")?.addEventListener("click",()=>{
      if(!confirm("User wirklich löschen? Du wirst ausgeloggt."))return;
      clearUser(); S.user=null; S.authed=false;
      S.modal=null; render();
    });
  }

  /* ---- CATEGORIES MODAL ---- */
  if(S.modal==="cats"){
    q("#cats-close")?.addEventListener("click",()=>{S.modal=null;render();});
    q("#modal-bg")?.addEventListener("click",e=>{if(e.target.id==="modal-bg"){S.modal=null;render();}});
    qa(".cat-del").forEach(btn=>{
      btn.addEventListener("click",async()=>{
        if(!confirm("Kategorie löschen?"))return;
        await dbRemove("categories/"+btn.dataset.id);
        toast("Kategorie gelöscht");
      });
    });
    q("#nc-add")?.addEventListener("click",async()=>{
      const name=q("#nc-name")?.value?.trim();
      if(!name){toast("Bitte Namen eingeben!");return;}
      const palette=[
        {color:"#7c3aed",bg:"#ede9fe"},{color:"#059669",bg:"#d1fae5"},
        {color:"#db2777",bg:"#fce7f3"},{color:"#0284c7",bg:"#e0f2fe"},
        {color:"#d97706",bg:"#fef3c7"},{color:"#dc2626",bg:"#fee2e2"},
        {color:"#0891b2",bg:"#e0f7fa"},{color:"#65a30d",bg:"#ecfccb"},
      ];
      const idx=Object.keys(S.categories).length%palette.length;
      const newCat={id:"cat-"+uid(),label:name,color:palette[idx].color,bg:palette[idx].bg};
      await dbSet("categories/"+newCat.id, newCat);
      toast("Kategorie hinzugefügt!");
      S.newCatName=""; render();
    });
  }

  /* ---- RATING MODAL ---- */
  if(S.modal&&S.modal.startsWith("rating:")){
    const id=S.modal.split(":")[1];
    q("#rating-cancel")?.addEventListener("click",()=>{S.modal=null;render();});
    q("#modal-bg")?.addEventListener("click",e=>{if(e.target.id==="modal-bg"){S.modal=null;render();}});
    q("#rating-range")?.addEventListener("input",e=>{
      const v=parseInt(e.target.value);
      S.ratingVal=v;
      const lbl=q("#rv-label"); if(lbl)lbl.textContent=v+"%";
      const bar=q("#rv-bar"); if(bar)bar.style.width=v+"%";
    });
    q("#rating-save")?.addEventListener("click",async()=>{
      const a=S.activities[id]; if(!a)return;
      a.rating=S.ratingVal;
      await dbSet("activities/"+id, a);
      toast("⭐ Bewertung gespeichert!");
      S.modal=null; render();
    });
  }
}

   START
   ============================================================ */
// Check if Firebase config is set
if(FIREBASE_CONFIG.apiKey==="DEIN_API_KEY"){
  // Demo mode: use localStorage only
  console.warn("Firebase nicht konfiguriert – lokaler Modus aktiv");
  S.dbReady=true;
  S.activities=JSON.parse(localStorage.getItem("fc_acts_demo")||"{}");
  S.categories={};
  DEFAULT_CATEGORIES.forEach(c=>S.categories[c.id]=c);
  // Override save/remove for demo
  window._demoMode=true;
}

// Patch dbSet/dbRemove for demo mode
const _origSet=dbSet, _origRemove=dbRemove;
async function dbSet(path,value){
  if(window._demoMode){
    if(path.startsWith("activities/")){const id=path.split("/")[1];S.activities[id]=value;localStorage.setItem("fc_acts_demo",JSON.stringify(S.activities));}
    else if(path.startsWith("categories/")){const id=path.split("/")[1];S.categories[id]=value;}
    render(); return;
  }
  if(S.db){await S.db.ref(path).set(value);}
}
async function dbRemove(path){
  if(window._demoMode){
    if(path.startsWith("activities/")){const id=path.split("/")[1];delete S.activities[id];localStorage.setItem("fc_acts_demo",JSON.stringify(S.activities));}
    else if(path.startsWith("categories/")){const id=path.split("/")[1];delete S.categories[id];}
    render(); return;
  }
  if(S.db){await S.db.ref(path).remove();}
}

if(!window._demoMode){
  initFirebase();
} else {
  render();
}
</script>
